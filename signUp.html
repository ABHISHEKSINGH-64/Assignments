<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
Create Account
</h2>

<form id="signupForm">

<!-- Name -->
<label class="block text-sm font-medium mb-1">Name</label>
<input 
type="text" 
id="name"
class="w-full border p-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"
placeholder="Enter your name"
>

<!-- Email -->
<label class="block text-sm font-medium mb-1">Email</label>
<input 
type="email" 
id="email"
class="w-full border p-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"
placeholder="Enter your email"
>

<!-- Password -->
<label class="block text-sm font-medium mb-1">Password</label>
<div class="relative mb-4">
<input 
type="password" 
id="password"
class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
placeholder="Enter password"
>
<button type="button" onclick="togglePassword()" 
class="absolute right-2 top-2 text-sm text-gray-500">
Show
</button>
</div>

<button 
class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition"
>
Sign Up
</button>

</form>

<p id="message" class="text-center mt-4 text-sm"></p>

</div>

<script>

// Toggle password visibility
function togglePassword() {
    let password = document.getElementById("password");
    password.type = password.type === "password" ? "text" : "password";
}

// Email validation
function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Form submit
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");

    // Reset message
    message.innerText = "";

    // Validation
    if (!name || !email || !password) {
        showMessage("⚠️ All fields are required", "orange");
        return;
    }

    if (!isValidEmail(email)) {
        showMessage("⚠️ Invalid email format", "orange");
        return;
    }

    if (password.length < 6) {
        showMessage("⚠️ Password must be at least 6 characters", "orange");
        return;
    }

    // Get users
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Check duplicate
    if (users.some(user => user.email === email)) {
        showMessage("❌ User already exists", "red");
        return;
    }

    // Save user
    users.push({ name, email, password });
    localStorage.setItem("users", JSON.stringify(users));

    showMessage("✅ Registration successful", "green");

    // Redirect
    setTimeout(() => {
        window.location.href = "login.html";
    }, 1200);
});

// Helper function
function showMessage(text, color) {
    let message = document.getElementById("message");
    message.innerText = text;
    message.style.color = color;
}

</script>

</body>
</html>
