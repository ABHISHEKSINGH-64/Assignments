<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-80">

<h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
Login
</h2>

<form id="loginForm">

<!-- Email -->
<input 
type="email" 
id="email" 
placeholder="Enter your Email"
class="w-full border p-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-purple-400"
>

<!-- Password -->
<div class="relative mb-4">
<input 
type="password" 
id="password" 
placeholder="Enter your Password"
class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-purple-400"
>
<button type="button" onclick="togglePassword()" 
class="absolute right-2 top-2 text-sm text-gray-500">
Show
</button>
</div>

<button 
class="w-full bg-purple-600 text-white p-2 rounded hover:bg-purple-700 transition"
>
Login
</button>

</form>

<p id="message" class="text-center mt-4 text-sm"></p>

</div>

<script>

// Toggle password
function togglePassword(){
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

// Email validation
function isValidEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Login
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");

    message.innerText = "";

    // Validation
    if(!email || !password){
        showMessage("⚠️ Please fill all fields", "orange");
        return;
    }

    if(!isValidEmail(email)){
        showMessage("⚠️ Invalid email format", "orange");
        return;
    }

    // Get users from localStorage
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Find user
    let foundUser = users.find(user => 
        user.email === email && user.password === password
    );

    if(foundUser){
        showMessage("✅ Login Successful", "green");

        // Save login session
        localStorage.setItem("loggedInUser", JSON.stringify(foundUser));

        // Redirect
        setTimeout(()=>{
            window.location.href = "dashboard.html";
        }, 1200);

    } else {
        showMessage("❌ Invalid Email or Password", "red");
    }
});

// Message helper
function showMessage(text, color){
    let message = document.getElementById("message");
    message.innerText = text;
    message.style.color = color;
}

</script>

</body>
</html>
