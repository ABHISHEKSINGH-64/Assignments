<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-80">

    <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

    <input 
        type="email" 
        id="email" 
        placeholder="Enter your Email"
        class="w-full border p-2 rounded mb-4"
    >

    <input 
        type="password" 
        id="password" 
        placeholder="Enter your Password"
        class="w-full border p-2 rounded mb-4"
    >

    <button 
        onclick="login()"
        class="w-full bg-purple-600 text-white p-2 rounded hover:bg-purple-700"
    >
        Login
    </button>

    <p id="message" class="text-center mt-4 text-sm"></p>

</div>

<script>

let users = [
    {email:"abhi123@gmail.com", password:"1234"}
];

function login(){

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");

    // ✅ Validation
    if(email === "" || password === ""){
        message.innerHTML = "⚠️ Please fill all fields";
        message.style.color = "orange";
        return;
    }

    // ✅ Check user
    let foundUser = users.find(user => 
        user.email === email && user.password === password
    );

    if(foundUser){
        message.innerHTML = "✅ Login Successful";
        message.style.color = "green";

        // 👉 Redirect after login (optional)
        setTimeout(()=>{
            window.location.href = "dashboard.html";
        }, 1000);

    } else {
        message.innerHTML = "❌ Invalid Email or Password";
        message.style.color = "red";
    }
}

</script>

</body>
</html>
